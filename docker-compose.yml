services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hotel_hackathon
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
